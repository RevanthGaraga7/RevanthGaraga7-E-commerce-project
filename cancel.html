<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancel Request - Aurora Dark Theme</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    
    .aurora {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #000428 0%, #004e92 25%, #000428 50%, #004e92 75%, #000428 100%);
      background-size: 400% 400%;
      animation: auroraShift 8s ease infinite;
    }

    @keyframes auroraShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    
    .aurora-band {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.6;
      animation: auroraFloat 20s infinite linear;
    }

    .band-1 {
      width: 300px;
      height: 300px;
      background: linear-gradient(45deg, #ff6b6b, #ffa500);
      top: -100px;
      left: 10%;
      animation-delay: 0s;
    }

    .band-2 {
      width: 400px;
      height: 400px;
      background: linear-gradient(45deg, #00d4ff, #0099cc);
      top: -150px;
      right: 10%;
      animation-delay: -7s;
    }

    .band-3 {
      width: 250px;
      height: 250px;
      background: linear-gradient(45deg, #f4d03f, #f39c12);
      bottom: -50px;
      left: 50%;
      animation-delay: -14s;
    }

    @keyframes auroraFloat {
      0% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-30px) rotate(90deg); }
      50% { transform: translateY(-15px) rotate(180deg); }
      75% { transform: translateY(-25px) rotate(270deg); }
      100% { transform: translateY(0px) rotate(360deg); }
    }

    
    .dot-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #eee, transparent),
        radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent);
      background-repeat: repeat;
      background-size: 100px 100px;
      opacity: 0.1;
      animation: gridFloat 20s linear infinite;
    }

    @keyframes gridFloat {
      0% { transform: translate(0, 0); }
      100% { transform: translate(10px, 10px); }
    }

   
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 120px 20px 60px;
      color: white;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 4rem;
      margin-bottom: 20px;
      background: linear-gradient(45deg, #fff, #ff6b6b, #ffa500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)); }
      to { filter: drop-shadow(0 0 30px rgba(255,107,107,0.8)); }
    }

    .hero p {
      font-size: 1.4rem;
      margin-bottom: 50px;
      opacity: 0.95;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      transition: all 0.4s ease;
      min-width: 220px;
    }

    .stat-card:hover {
      transform: translateY(-15px) scale(1.05);
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      border-color: rgba(255,255,255,0.4);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: bold;
      background: linear-gradient(45deg, #fff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      margin-bottom: 10px;
    }

    .stat-label {
      color: rgba(255,255,255,0.9);
      font-size: 1.1rem;
    }

    
    #cancel-request-btn {
      position: fixed;
      bottom: 40px;
      right: 40px;
      padding: 18px 36px;
      background: linear-gradient(45deg, #dc3545, #ff4757);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 15px 35px rgba(220,53,69,0.4);
      z-index: 1000;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #cancel-request-btn:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 25px 50px rgba(220,53,69,0.6);
    }

    #cancel-request-btn:active {
      transform: translateY(-4px);
    }

   
    #cancel-request-form-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    #cancel-request-form-container.visible {
      opacity: 1;
      visibility: visible;
    }

    .cancel-request-form {
      background: rgba(20,20,40,0.95);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 45px;
      border-radius: 25px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 35px 80px rgba(0,0,0,0.7);
      position: relative;
      transform: scale(0.7) rotateX(10deg);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #cancel-request-form-container.visible .cancel-request-form {
      transform: scale(1) rotateX(0deg);
    }

    .cancel-request-form::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, transparent, #ff4757, transparent);
      border-radius: 25px 25px 0 0;
    }

    .cancel-request-form h2 {
      margin-bottom: 35px;
      font-size: 32px;
      text-align: center;
      color: #fff;
      background: linear-gradient(45deg, #fff, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .cancel-request-form label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      font-size: 15px;
    }

    .cancel-request-form input,
    .cancel-request-form textarea,
    .cancel-request-form select {
      width: 100%;
      padding: 15px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .cancel-request-form input::placeholder,
    .cancel-request-form textarea::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .cancel-request-form input:focus,
    .cancel-request-form textarea:focus,
    .cancel-request-form select:focus {
      outline: none;
      border-color: #ff4757;
      box-shadow: 0 0 0 3px rgba(255,71,87,0.2);
      background: rgba(255,255,255,0.12);
    }

    .cancel-request-form textarea {
      resize: vertical;
      min-height: 140px;
      grid-column: 1 / -1;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .cancel-request-form button {
      flex: 1;
      padding: 15px 25px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cancel-request-form button[type="submit"] {
      background: linear-gradient(45deg, #28a745, #20c997);
      color: white;
    }

    .cancel-request-form button[type="submit"]:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(40,167,69,0.4);
    }

    .cancel-request-form button[type="button"] {
      background: linear-gradient(45deg, #6c757d, #495057);
      color: white;
    }

    .cancel-request-form button[type="button"]:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(108,117,125,0.4);
    }

    .hidden {
      display: none !important;
    }

    
    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .cancel-request-form {
        width: 95vw;
        padding: 30px 25px;
      }

      .hero h1 {
        font-size: 2.5rem;
      }

      .stats {
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="aurora-band band-1"></div>
  <div class="aurora-band band-2"></div>
  <div class="aurora-band band-3"></div>
  <div class="dot-grid"></div>

  <div class="hero">
    <h1>Request Cancellation</h1>
    <p>Cancelling your order? No problem. We'll process your request within 24 hours and issue refund to your original payment method.</p>
    
    <div class="stats">
      <div class="stat-card">
        <span class="stat-number">24h</span>
        <div class="stat-label">Processing Time</div>
      </div>
      <div class="stat-card">
        <span class="stat-number">7</span>
        <div class="stat-label">Refund Days</div>
      </div>
      <div class="stat-card">
        <span class="stat-number">🔒</span>
        <div class="stat-label">Secure Process</div>
      </div>
    </div>
  </div>

  <button id="cancel-request-btn">Cancel Request</button>

  <!-- Cancel Request  -->
  <div id="cancel-request-form-container" class="hidden">
    <div class="cancel-request-form">
      <h2>Cancel Order</h2>
      
      <form id="cancelRequestForm">
        <div class="form-row">
          <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
          </div>
          <div>
            <label for="order-id">Order ID</label>
            <input type="text" id="order-id" name="order-id" placeholder="#12345" required>
          </div>
        </div>
        
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>

        <label for="reason">Reason for Cancellation</label>
        <textarea id="reason" name="reason" placeholder="Tell us why you're cancelling (late delivery, wrong item, etc.)" required></textarea>

        <div class="button-group">
          <button type="submit">Submit Request</button>
          <button type="button" class="close-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const openBtn = document.getElementById('cancel-request-btn');
      const closeBtn = document.querySelector('.close-btn');
      const modal = document.getElementById('cancel-request-form-container');
      const form = document.getElementById('cancelRequestForm');

      
      openBtn.addEventListener('click', function() {
        modal.classList.remove('hidden');
        setTimeout(() => modal.classList.add('visible'), 10);
      });

      closeBtn.addEventListener('click', function() {
        modal.classList.remove('visible');
        setTimeout(() => modal.classList.add('hidden'), 400);
      });

      window.addEventListener('click', function(e) {
        if (e.target === modal) {
          modal.classList.remove('visible');
          setTimeout(() => modal.classList.add('hidden'), 400);
        }
      });

      form.addEventListener('submit', function(event) {
        event.preventDefault();

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const orderId = document.getElementById('order-id').value;
        const reason = document.getElementById('reason').value;

        if (!name || !email || !orderId || !reason) {
          alert('Please fill out all fields.');
          return;
        }

        console.log('Cancel Request Submitted:', { name, email, orderId, reason });

        form.reset();
        alert('Cancellation request submitted successfully! You will receive confirmation email shortly.');
        
        modal.classList.remove('visible');
        setTimeout(() => modal.classList.add('hidden'), 400);
      });
    });
  </script>
</body>
</html>
